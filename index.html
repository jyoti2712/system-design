<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design — Complete Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --accent: #7c6af7;
    --accent2: #4ef0c0;
    --accent3: #f76a6a;
    --accent4: #f7b76a;
    --accent5: #6af7c0;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  /* SIDEBAR */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    z-index: 100;
    display: flex; flex-direction: column;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: var(--font-mono); }

  .search-wrap { padding: 16px; border-bottom: 1px solid var(--border); }
  .search {
    width: 100%; padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--font-body);
    outline: none; transition: border .2s;
  }
  .search:focus { border-color: var(--accent); }
  .search::placeholder { color: var(--muted); }

  .nav-section { padding: 8px 0; }
  .nav-cat {
    padding: 10px 24px 4px;
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--muted);
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 24px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    border-left: 2px solid transparent;
    text-decoration: none;
  }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--accent2); border-left-color: var(--accent2); background: rgba(78,240,192,.05); }
  .nav-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }

  /* MAIN */
  .main { margin-left: 260px; min-height: 100vh; }

  /* HERO */
  .hero {
    padding: 80px 60px 60px;
    border-bottom: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute; top: -100px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(124,106,247,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent2);
    background: rgba(78,240,192,.08);
    border: 1px solid rgba(78,240,192,.2);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
    letter-spacing: .06em;
  }
  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(36px, 5vw, 60px);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1.05;
    margin-bottom: 16px;
  }
  .hero h1 span { color: var(--accent); }
  .hero p { color: var(--muted); max-width: 540px; font-size: 16px; line-height: 1.7; }
  .hero-stats {
    display: flex; gap: 40px; margin-top: 36px;
    flex-wrap: wrap;
  }
  .stat-item {}
  .stat-num {
    font-family: var(--font-display);
    font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label { font-size: 12px; color: var(--muted); font-family: var(--font-mono); }

  /* CONTENT */
  .content { padding: 40px 60px 80px; }

  /* TOPIC CARD */
  .topic-section {
    margin-bottom: 60px;
    scroll-margin-top: 24px;
  }
  .section-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .section-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 700;
    letter-spacing: -0.5px;
  }
  .section-cat {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .topic-card:hover { border-color: var(--border2); }

  .card-inner { padding: 28px 32px; }

  .definition {
    font-size: 15px;
    color: var(--text);
    line-height: 1.8;
    margin-bottom: 24px;
    padding-left: 16px;
    border-left: 3px solid var(--accent);
  }

  .label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .example {
    background: var(--surface2);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    font-size: 14px;
    line-height: 1.8;
    color: #b0b0cc;
    border: 1px solid var(--border);
  }
  .example strong { color: var(--accent2); font-weight: 500; }

  /* DIAGRAM */
  .diagram-wrap {
    background: var(--surface2);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
    overflow-x: auto;
  }
  .diagram-wrap svg { display: block; width: 100%; max-width: 680px; }

  /* KEY TERMS */
  .terms-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
    margin-bottom: 24px;
  }
  .term {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .term-key {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 2px;
  }
  .term-val { font-size: 12px; color: var(--muted); }

  /* PROS CONS */
  .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .pros, .cons {
    border-radius: 10px;
    padding: 16px;
  }
  .pros {
    background: rgba(78,240,192,.05);
    border: 1px solid rgba(78,240,192,.15);
  }
  .cons {
    background: rgba(247,106,106,.05);
    border: 1px solid rgba(247,106,106,.15);
  }
  .pros h4 { color: var(--accent2); font-size: 12px; font-weight: 500; margin-bottom: 8px; font-family: var(--font-mono); }
  .cons h4 { color: var(--accent3); font-size: 12px; font-weight: 500; margin-bottom: 8px; font-family: var(--font-mono); }
  .pros li, .cons li { font-size: 13px; color: var(--muted); margin-left: 16px; margin-bottom: 4px; }

  /* PROCESS STEPS */
  .process {
    display: flex; flex-direction: column; gap: 0;
    margin-bottom: 24px;
  }
  .step {
    display: flex; gap: 16px; align-items: flex-start;
    position: relative;
  }
  .step:not(:last-child)::before {
    content: '';
    position: absolute;
    left: 15px; top: 36px;
    width: 1px; height: calc(100% - 4px);
    background: var(--border2);
  }
  .step-num {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    flex-shrink: 0;
    z-index: 1;
  }
  .step-content { padding: 6px 0 20px; }
  .step-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .step-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }

  /* COMPARISON TABLE */
  .table-wrap { overflow-x: auto; margin-bottom: 24px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 10px 14px;
    background: var(--surface2);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .05em;
    font-weight: 400;
    border-bottom: 1px solid var(--border2);
  }
  td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  td:first-child { color: var(--accent2); font-family: var(--font-mono); font-size: 12px; }

  /* FORMULA BOX */
  .formula {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 14px 18px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--accent4);
    margin-bottom: 16px;
  }

  /* CATEGORY COLORS */
  .cat-networking { --c: #6af7c0; }
  .cat-scalability { --c: #7c6af7; }
  .cat-performance { --c: #f7b76a; }
  .cat-databases { --c: #6ab4f7; }
  .cat-theory { --c: #f76a6a; }
  .cat-architecture { --c: #c06af7; }
  .cat-async { --c: #6af7f7; }
  .cat-security { --c: #f7f76a; }
  .cat-algorithms { --c: #f76ac0; }
  .cat-design { --c: #6af790; }
  .cat-reliability { --c: #f7956a; }
  .cat-communication { --c: #6a95f7; }

  .section-cat { background: color-mix(in srgb, var(--c) 10%, transparent); color: var(--c); border: 1px solid color-mix(in srgb, var(--c) 25%, transparent); }
  .section-icon { background: color-mix(in srgb, var(--c) 10%, transparent); }

  /* MOBILE MENU */
  .hamburger { display: none; }

  /* SCROLLBAR */
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* BACK TO TOP */
  .back-top {
    position: fixed; bottom: 28px; right: 28px;
    width: 44px; height: 44px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    color: var(--muted);
    transition: all .2s;
    z-index: 200;
    text-decoration: none;
  }
  .back-top:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); transition: transform .3s; }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .hero { padding: 60px 24px 40px; }
    .content { padding: 24px 24px 60px; }
    .hamburger {
      display: block;
      position: fixed; top: 16px; left: 16px;
      z-index: 200;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      width: 40px; height: 40px;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
    }
    .pros-cons { grid-template-columns: 1fr; }
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .topic-section { animation: fadeUp .4s ease both; }

  /* HIGHLIGHT SEARCH */
  mark { background: rgba(124,106,247,.3); color: var(--text); border-radius: 2px; padding: 0 2px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-title">SysDes.io</div>
    <div class="logo-sub">Complete Reference Guide</div>
  </div>
  <div class="search-wrap">
    <input class="search" placeholder="Search topics..." id="searchInput" oninput="handleSearch(this.value)">
  </div>
  <div class="nav-section" id="navLinks"></div>
</nav>

<!-- MAIN -->
<main class="main">
  <section class="hero">
    <div class="hero-tag">Complete Reference — 2024</div>
    <h1>System Design<br><span>Complete Notes</span></h1>
    <p>Every concept you need for system design interviews and building scalable distributed systems — with real-world examples and visual diagrams.</p>
    <div class="hero-stats">
      <div class="stat-item"><div class="stat-num" id="topicCount">30+</div><div class="stat-label">Topics covered</div></div>
      <div class="stat-item"><div class="stat-num">12</div><div class="stat-label">Categories</div></div>
      <div class="stat-item"><div class="stat-num">∞</div><div class="stat-label">Scalability</div></div>
    </div>
  </section>
  <div class="content" id="content"></div>
</main>

<button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
<a class="back-top" href="#" title="Back to top">↑</a>

<script>
const topics = [
  {
    id: "dns", cat: "Networking", icon: "🌐", color: "networking",
    title: "DNS — Domain Name System",
    definition: "DNS (Domain Name System) is the internet's phone book. It translates human-readable domain names like <code style='color:var(--accent2)'>google.com</code> into machine-readable IP addresses like <code style='color:var(--accent2)'>142.250.80.46</code>. Without DNS, you'd have to memorize IP addresses for every website.",
    steps: [
      { title: "Browser Cache Check", desc: "Browser checks its local DNS cache. If the IP is cached and not expired, uses it directly (sub-millisecond)." },
      { title: "OS Cache / hosts file", desc: "If not in browser cache, OS checks /etc/hosts file and its own resolver cache." },
      { title: "Recursive Resolver", desc: "Request goes to your ISP's recursive resolver. It will do all the heavy lifting on your behalf." },
      { title: "Root Nameserver Query", desc: "Resolver asks one of 13 root servers. Root says 'I don't know google.com, but .com is managed by Verisign — ask them'." },
      { title: "TLD Nameserver", desc: "Resolver asks the .com TLD server. It returns the authoritative nameserver for google.com." },
      { title: "Authoritative Nameserver", desc: "Resolver asks Google's own nameserver. It returns the actual IP: 142.250.80.46. This answer is cached with TTL." },
      { title: "Response to Client", desc: "Resolver returns IP to browser. Browser connects to 142.250.80.46. Total time: 50–200ms on first lookup, <1ms on cache hit." }
    ],
    example: "<strong>Real example:</strong> You type <em>amazon.com</em> → Browser checks cache (miss) → OS resolver asks ISP → ISP resolver queries root → Root says ask .com TLD → TLD returns Amazon's NS (ns1.p31.dynect.net) → Amazon NS returns 176.32.103.205 → Connection established in ~80ms.",
    terms: [
      { k: "A Record", v: "Maps domain → IPv4 address" },
      { k: "AAAA Record", v: "Maps domain → IPv6 address" },
      { k: "CNAME", v: "Alias pointing to another domain" },
      { k: "MX Record", v: "Specifies mail server" },
      { k: "NS Record", v: "Specifies nameservers for domain" },
      { k: "TTL", v: "How long to cache the record (seconds)" },
      { k: "SOA", v: "Start of Authority — zone metadata" },
      { k: "PTR Record", v: "Reverse DNS: IP → domain" }
    ],
    pros: ["Caching reduces lookup latency to <1ms", "Distributed — no single point of failure", "Hierarchical design enables massive scale", "Human-readable names instead of IPs"],
    cons: ["DNS propagation can take 24-48 hours", "Vulnerable to DNS spoofing/cache poisoning", "TTL too low = high DNS traffic; too high = stale", "DNS-based load balancing is coarse-grained"]
  },
  {
    id: "loadbalancer", cat: "Scalability", icon: "⚖️", color: "scalability",
    title: "Load Balancer",
    definition: "A load balancer distributes incoming network traffic across multiple servers ensuring no single server becomes overwhelmed. It acts as a reverse proxy, sitting between clients and backend servers, improving availability, throughput, and fault tolerance.",
    steps: [
      { title: "Client Request Arrives", desc: "Client sends HTTP request to your domain. DNS resolves to the load balancer's VIP (Virtual IP)." },
      { title: "Health Check", desc: "Load balancer continuously pings backend servers (every 5–30s). Dead servers are removed from the pool automatically." },
      { title: "Algorithm Selection", desc: "LB picks a server based on configured algorithm: Round Robin, Least Connections, IP Hash, or Weighted Round Robin." },
      { title: "Request Forwarding", desc: "LB forwards the request to the chosen server, replacing headers (X-Forwarded-For with client IP)." },
      { title: "Response Passthrough", desc: "Backend server processes request and sends response back through the LB to the client." },
      { title: "Session Persistence", desc: "If sticky sessions enabled, same client always routes to same server (based on cookie or IP hash)." }
    ],
    example: "<strong>Netflix example:</strong> 200M users hit api.netflix.com → AWS ALB receives all traffic → Checks health of 500 backend pods → Routes using Least Connections to the least busy pod → If Pod A has 1000 active connections and Pod B has 200, new request goes to Pod B → Pod crashes? Removed from rotation in 10 seconds.",
    terms: [
      { k: "Round Robin", v: "Rotate through servers sequentially" },
      { k: "Least Connections", v: "Route to server with fewest active connections" },
      { k: "IP Hash", v: "Same client IP → same server (stickiness)" },
      { k: "Weighted", v: "Stronger servers get proportionally more traffic" },
      { k: "Layer 4 LB", v: "TCP/UDP level — fast, no content inspection" },
      { k: "Layer 7 LB", v: "HTTP level — can route by URL, headers, cookies" },
      { k: "Health Check", v: "Regular probe to detect dead servers" },
      { k: "VIP", v: "Virtual IP — the single IP clients connect to" },
      { k: "SSL Termination", v: "LB decrypts HTTPS, backend gets plain HTTP" }
    ],
    pros: ["Eliminates single point of failure", "Enables horizontal scaling", "SSL termination offloads crypto from backends", "Geographic routing for global apps", "Blue-green and canary deployments"],
    cons: ["LB itself can be a bottleneck (use active-passive pair)", "Session stickiness complicates stateless design", "Added network hop adds ~1ms latency", "Cost of managed LB services"]
  },
  {
    id: "caching", cat: "Performance", icon: "⚡", color: "performance",
    title: "Caching",
    definition: "Caching stores copies of frequently accessed data in a fast-access layer (usually in-memory) so future requests can be served faster without hitting the original, slower source (database, API, or computation). It's one of the highest-ROI optimizations in system design.",
    steps: [
      { title: "Request Arrives", desc: "Application receives a request for data (e.g., user profile for user_id=12345)." },
      { title: "Check Cache First", desc: "App checks Redis/Memcached: GET user:12345. If key exists and not expired → Cache HIT → return in ~0.1ms." },
      { title: "Cache Miss — Fetch Source", desc: "Key not found → Cache MISS. App queries the database: SELECT * FROM users WHERE id=12345. Takes 20–100ms." },
      { title: "Populate Cache", desc: "Store result in cache: SET user:12345 {data} EX 3600 (expires in 1 hour). All future requests served from cache." },
      { title: "Cache Invalidation", desc: "When user updates profile, invalidate cache: DEL user:12345. Or use write-through: update cache and DB simultaneously." }
    ],
    example: "<strong>Twitter timeline:</strong> @elonmusk's timeline requested by 10,000 users/second. Without cache: 10,000 DB queries/sec = DB meltdown. With Redis cache: First request computes timeline (200ms), stores in Redis as 'timeline:elonmusk' TTL=30s. Next 9,999 requests served from memory in 0.1ms each. 2000x speedup.",
    terms: [
      { k: "Cache HIT", v: "Data found in cache — fast path" },
      { k: "Cache MISS", v: "Data not in cache — must fetch from source" },
      { k: "TTL", v: "Time-to-live — how long before cache expires" },
      { k: "LRU", v: "Least Recently Used — evict oldest unused items" },
      { k: "LFU", v: "Least Frequently Used — evict least popular items" },
      { k: "Write-through", v: "Write to cache AND DB simultaneously" },
      { k: "Write-back", v: "Write to cache first, sync to DB later" },
      { k: "Write-around", v: "Write directly to DB, bypass cache" },
      { k: "Cache stampede", v: "Many simultaneous misses overwhelm DB" },
      { k: "Thundering herd", v: "Cache expiry causes sudden DB spike" }
    ],
    pros: ["10–10,000x latency reduction", "Dramatically reduces database load", "Can absorb massive traffic spikes", "Reduces cloud compute costs"],
    cons: ["Cache invalidation is notoriously hard", "Stale data risk", "Memory is expensive", "Cold start: first request always misses", "Distributed cache consistency challenges"]
  },
  {
    id: "cap", cat: "Theory", icon: "🔺", color: "theory",
    title: "CAP Theorem",
    definition: "Brewer's CAP Theorem states that a distributed data store can only guarantee 2 of these 3 properties simultaneously: Consistency (every read sees the latest write), Availability (every request gets a response, not an error), and Partition Tolerance (system keeps running despite network splits). Since network partitions are inevitable, real systems must choose between C and A.",

// Build nav
const cats = {};
topics.forEach(t => {
  if (!cats[t.cat]) cats[t.cat] = [];
  cats[t.cat].push(t);
});

const catColors = {
  Networking: '#6af7c0', Scalability: '#7c6af7', Performance: '#f7b76a',
  Databases: '#6ab4f7', Theory: '#f76a6a', Architecture: '#c06af7',
  Async: '#6af7f7', Security: '#f7f76a', Algorithms: '#f76ac0',
  Design: '#6af790', Reliability: '#f7956a', Communication: '#6a95f7',
  APIs: '#f7c06a', Storage: '#a06af7'
};

const navLinks = document.getElementById('navLinks');
Object.entries(cats).forEach(([cat, items]) => {
  const catDiv = document.createElement('div');
  catDiv.innerHTML = `<div class="nav-cat">${cat}</div>`;
  items.forEach(t => {
    const a = document.createElement('a');
    a.className = 'nav-item';
    a.href = '#' + t.id;
    a.innerHTML = `<span class="nav-dot" style="background:${catColors[cat]||'#7c6af7'}"></span>${t.title.split('—')[0].trim()}`;
    a.onclick = () => {
      document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
      a.classList.add('active');
      if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
    };
    catDiv.appendChild(a);
  });
  navLinks.appendChild(catDiv);
});

document.getElementById('topicCount').textContent = topics.length;

function escapeHtml(s) {
  return s.replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderTopics(list) {
  const content = document.getElementById('content');
  content.innerHTML = list.map(t => `
    <section class="topic-section cat-${t.color}" id="${t.id}">
      <div class="section-header">
        <div class="section-icon">${t.icon}</div>
        <div class="section-title">${t.title}</div>
        <span class="section-cat">${t.cat}</span>
      </div>
      <div class="topic-card">
        <div class="card-inner">
          <div class="label">Definition</div>
          <p class="definition">${t.definition}</p>

          <div class="label">Step-by-Step Process</div>
          <div class="process">
            ${t.steps.map((s,i) => `
              <div class="step">
                <div class="step-num">${i+1}</div>
                <div class="step-content">
                  <div class="step-title">${s.title}</div>
                  <div class="step-desc">${s.desc}</div>
                </div>
              </div>
            `).join('')}
          </div>

          <div class="label">Real-World Example</div>
          <div class="example">${t.example}</div>

          <div class="label">Key Terms</div>
          <div class="terms-grid">
            ${t.terms.map(k => `
              <div class="term">
                <div class="term-key">${k.k}</div>
                <div class="term-val">${k.v}</div>
              </div>
            `).join('')}
          </div>

          <div class="label">Trade-offs</div>
          <div class="pros-cons">
            <div class="pros">
              <h4>+ Advantages</h4>
              <ul>${t.pros.map(p => `<li>${p}</li>`).join('')}</ul>
            </div>
            <div class="cons">
              <h4>− Disadvantages</h4>
              <ul>${t.cons.map(c => `<li>${c}</li>`).join('')}</ul>
            </div>
          </div>
        </div>
      </div>
    </section>
  `).join('');
}

function handleSearch(q) {
  const lq = q.toLowerCase();
  if (!lq) { renderTopics(topics); return; }
  const filtered = topics.filter(t =>
    t.title.toLowerCase().includes(lq) ||
    t.definition.toLowerCase().includes(lq) ||
    t.cat.toLowerCase().includes(lq) ||
    t.terms.some(k => k.k.toLowerCase().includes(lq) || k.v.toLowerCase().includes(lq))
  );
  renderTopics(filtered);
}

renderTopics(topics);

// Active nav on scroll
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const id = e.target.id;
      document.querySelectorAll('.nav-item').forEach(a => {
        a.classList.toggle('active', a.getAttribute('href') === '#' + id);
      });
    }
  });
}, { threshold: 0.3 });
document.querySelectorAll('.topic-section').forEach(s => observer.observe(s));
</script>
